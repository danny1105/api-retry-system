version: '3.8'

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  microservice-2:
    build: ./microservice-2
    ports:
      - "8081:8081"
    depends_on:
      - redpanda

  microservice-1:
    build: ./microservice-1
    environment:
      - KAFKA_BROKER=redpanda:9092
      - API_URL=http://microservice-2:8081/events
    depends_on:
      - redpanda
      - microservice-2

  producer:
    build: ./producer
    environment:
      - KAFKA_BROKER=redpanda:9092
    depends_on:
      - redpanda